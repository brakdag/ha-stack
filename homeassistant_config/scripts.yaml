control_inyeccion_cero_optimizado_gemini_12_11_2025:
  alias: Control Inyeccion Cero (optimizado Gemini 12 11 2025)
  mode: single
  variables:
    p_red: '{{ states(''sensor.shellyemg3_b08184e83968_energy_meter_0_power'') | float(0)
      }}'
    p_inversor: '{{ states(''sensor.mi_1200_p_ac'') | float(0) }}'
    p_inversor_base: 1200
    target_import: 12
    zona_muerta_max: 24
    zona_muerta_min: 0
    consumo_casa: '{{ p_inversor + p_red }}'
    nuevo_limite_w: '{{ [0, (consumo_casa - target_import)] | max }}'
    nuevo_limite_pct_raw: '{{ (nuevo_limite_w / p_inversor_base) * 100 }}'
    payload_final_pct: "{% if nuevo_limite_pct_raw > 100.0 %}\n  100.0\n{% else %}\n
      \ {{ \"%.1f\" | format(nuevo_limite_pct_raw) }}\n{% endif %}"
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ p_red >= zona_muerta_min and p_red <= zona_muerta_max
          }}'
      sequence: []
    default:
    - data:
        topic: inverter/ctrl/limit/0
        payload: '{{ payload_final_pct }}'
      action: mqtt.publish
  description: Versión optimizada que elimina el límite estático de 650W y ajusta
    siempre al consumo. Llamar cada 15s.
script_gestor_termo_v2_sondeo_2:
  alias: Script Gestor Termo v2(Sondeo)
  description: Sondea si el sistema puede manejar el termotanque (350W) sin importar
    de la red.
  mode: restart
  variables:
    switch_id: switch.esp01_relay_termotaque
    sensor_red: sensor.shellyemg3_b08184e83968_energy_meter_0_power
    umbral_import_apagado: 100
    tiempo_espera_sondeo: 45
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_state(switch_id, ''on'') }}'
      sequence:
      - variables:
          p_red_actual: '{{ states(sensor_red) | float(0) }}'
      - condition: template
        value_template: '{{ p_red_actual > umbral_import_apagado }}'
      - target:
          entity_id: '{{ switch_id }}'
        action: switch.turn_off
    - conditions:
      - condition: template
        value_template: '{{ is_state(switch_id, ''off'') }}'
      sequence:
      - target:
          entity_id: '{{ switch_id }}'
        action: switch.turn_on
      - delay:
          seconds: 45
      - variables:
          p_red_despues_del_sondeo: '{{ states(sensor_red) | float(0) }}'
      - condition: template
        value_template: '{{ p_red_despues_del_sondeo > umbral_import_apagado }}'
      - target:
          entity_id: '{{ switch_id }}'
        action: switch.turn_off
    default: []
